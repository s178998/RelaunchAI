version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: relaunchai_user
      POSTGRES_PASSWORD: relaunchai_pass
      POSTGRES_DB: relaunchai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relaunchai_user -d relaunchai_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://relaunchai_user:relaunchai_pass@db:5432/relaunchai_db
      SECRET_KEY: supersecretkey-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      APP_NAME: RelaunchAI
      DEBUG: "True"
    volumes:
      - ./app:/app/app   # for live code reload (optional)
    env_file:
      - .env

volumes:
  postgres_data: